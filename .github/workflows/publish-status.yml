name: Publish Status Site

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - publish-status

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static status site
        run: python scripts/build_status_site.py --event-path "${{ github.event_path }}" --output-dir site

      - name: Upload status snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: status-site-${{ github.run_id }}
          path: |
            site/index.html
            site/status.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
